<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Capital Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold text-blue-800">CapitalControl</h1>
                <p class="text-gray-500">Gestão inteligente para você e sua empresa.</p>
            </div>
            <div class="bg-blue-100 p-3 rounded-lg">
                <span id="data-atual" class="font-semibold text-blue-700"></span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-green-500">
                <p class="text-sm text-gray-500 uppercase font-bold">Total Entradas</p>
                <h2 id="total-entradas" class="text-2xl font-bold text-green-600">R$ 0,00</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-red-500">
                <p class="text-sm text-gray-500 uppercase font-bold">Total Saídas</p>
                <h2 id="total-saidas" class="text-2xl font-bold text-red-600">R$ 0,00</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <p class="text-sm text-gray-500 uppercase font-bold">Saldo Disponível</p>
                <h2 id="saldo-total" class="text-2xl font-bold text-blue-700">R$ 0,00</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="bg-white p-8 rounded-2xl shadow-sm">
                <h3 class="text-xl font-bold mb-6 text-gray-800">Nova Transação</h3>
                <form id="form-transacao" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Descrição</label>
                        <input type="text" id="desc" placeholder="Ex: Venda de Produto ou Aluguel" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Valor (R$)</label>
                            <input type="number" step="0.01" id="valor" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Tipo</label>
                            <select id="tipo" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="entrada">Entrada (+)</option>
                                <option value="saida">Saída (-)</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition">Adicionar Registro</button>
                </form>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-sm flex flex-col items-center justify-center">
                <h3 class="text-xl font-bold mb-6 text-gray-800 text-left w-full">Visão Geral</h3>
                <div class="w-full max-w-[300px]">
                    <canvas id="graficoGastos"></canvas>
                </div>
            </div>
        </div>

        <div class="mt-10 bg-white rounded-2xl shadow-sm overflow-hidden">
            <div class="p-6 border-b border-gray-100 font-bold text-lg text-gray-800">Histórico de Movimentações</div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-500 text-sm uppercase">
                        <tr>
                            <th class="p-4 font-semibold">Descrição</th>
                            <th class="p-4 font-semibold text-center">Tipo</th>
                            <th class="p-4 font-semibold text-right">Valor</th>
                        </tr>
                    </thead>
                    <tbody id="lista-transacoes">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let transacoes = [];
        let meuGrafico;

        const form = document.getElementById('form-transacao');
        const lista = document.getElementById('lista-transacoes');
        
        // Formatar data
        document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR');

        // Função para atualizar cálculos
        function atualizarResumo() {
            const entradas = transacoes
                .filter(t => t.tipo === 'entrada')
                .reduce((acc, t) => acc + t.valor, 0);
            
            const saidas = transacoes
                .filter(t => t.tipo === 'saida')
                .reduce((acc, t) => acc + t.valor, 0);

            const saldo = entradas - saidas;

            document.getElementById('total-entradas').innerText = `R$ ${entradas.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('total-saidas').innerText = `R$ ${saidas.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('saldo-total').innerText = `R$ ${saldo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

            atualizarGrafico(entradas, saidas);
        }

        // Função para renderizar lista
        function renderizarLista() {
            lista.innerHTML = "";
            transacoes.forEach((t) => {
                const corTexto = t.tipo === 'entrada' ? 'text-green-600' : 'text-red-600';
                const row = `
                    <tr class="border-b border-gray-50 hover:bg-gray-50">
                        <td class="p-4 font-medium">${t.desc}</td>
                        <td class="p-4 text-center">
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${t.tipo === 'entrada' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                ${t.tipo.toUpperCase()}
                            </span>
                        </td>
                        <td class="p-4 text-right font-bold ${corTexto}">R$ ${t.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                    </tr>
                `;
                lista.innerHTML += row;
            });
        }

        // Função do Gráfico
        function atualizarGrafico(entradas, saidas) {
            const ctx = document.getElementById('graficoGastos').getContext('2d');
            
            if (meuGrafico) meuGrafico.destroy();

            meuGrafico = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Entradas', 'Saídas'],
                    datasets: [{
                        data: [entradas, saidas],
                        backgroundColor: ['#10b981', '#ef4444'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    cutout: '70%',
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        // Evento de Envio
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const desc = document.getElementById('desc').value;
            const valor = parseFloat(document.getElementById('valor').value);
            const tipo = document.getElementById('tipo').value;

            transacoes.push({ desc, valor, tipo });
            
            form.reset();
            renderizarLista();
            atualizarResumo();
        });

        // Inicializar gráfico vazio
        atualizarGrafico(0, 0);
    </script>
</body>
</html>
